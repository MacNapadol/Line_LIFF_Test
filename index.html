<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>My Personal LIFF App</title>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <style>
      * {
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }
      body {
        background-color: #f4f6f8;
        margin: 0;
        padding: 16px;
      }
      .container {
        max-width: 400px;
        margin: 0 auto;
      }
      .profile-card {
        background: white;
        border-radius: 16px;
        padding: 16px;
        text-align: center;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        margin-bottom: 16px;
      }
      .profile-card img {
        width: 70px;
        height: 70px;
        border-radius: 50%;
        margin-bottom: 8px;
      }
      .profile-card h3 {
        margin: 4px 0;
        font-size: 18px;
        color: #333;
      }
      .menu-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .menu-item {
        background: white;
        border-radius: 12px;
        padding: 20px 12px;
        text-align: center;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
        cursor: pointer;
        border: none;
        transition: 0.2s;
      }
      .menu-item:active {
        transform: scale(0.97);
        background: #f0f0f0;
      }
      .menu-item .icon {
        font-size: 28px;
        margin-bottom: 8px;
        display: block;
      }
      .menu-item .title {
        font-weight: bold;
        color: #333;
        font-size: 14px;
      }
      .btn-share {
        background: #06c755;
        color: white;
        width: 100%;
        border: none;
        padding: 14px;
        border-radius: 12px;
        font-weight: bold;
        font-size: 16px;
        margin-top: 16px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="profile-card">
        <img
          id="pictureUrl"
          src="https://via.placeholder.com/70"
          alt="Profile"
        />
        <h3 id="displayName">กำลังโหลด...</h3>
        <p
          id="statusText"
          style="font-size: 12px; color: #888"
        >
          สถานะ: พร้อมใช้งาน
        </p>
      </div>

      <div class="menu-grid">
        <button
          class="menu-item"
          onclick="sendToCurrentChat()"
        >
          <span class="icon">💬</span>
          <span class="title">ส่งเข้าแชตนี้</span>
        </button>
        <button
          class="menu-item"
          onclick="openMyLink()"
        >
          <span class="icon">👤</span>
          <span class="title">แอดไลน์ส่วนตัว</span>
        </button>
      </div>

      <button
        class="btn-share"
        onclick="shareFlexToFriends()"
      >
        🚀 แชร์การ์ดนี้ให้เพื่อนใน LINE
      </button>
    </div>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <script src="app.js"></script>
  </body>
</html>
