<script>
  const MY_LIFF_ID = "2010672308-ckTBbuPW";

  async function main() {
    try {
      await liff.init({ liffId: MY_LIFF_ID });

      if (liff.isLoggedIn()) {
        // ถ้าระบบจำ Login ได้แล้ว ให้ดึงข้อมูลโปรไฟล์
        const profile = await liff.getProfile();
        document.getElementById("pictureUrl").src = profile.pictureUrl;
        document.getElementById("displayName").innerText = profile.displayName;
      } else {
        // ถ้ายังไม่ได้ Login
        if (liff.isInClient()) {
          // ถ้าเปิดในแอป LINE ให้ Login อัตโนมัติได้เลย
          liff.login();
        } else {
          // ถ้าเปิดบน Safari / Browser ภายนอก ห้ามสั่ง liff.login() ทันที!
          // ให้เปลี่ยน UI แสดงปุ่มให้ผู้ใช้กด Login เองเพื่อป้องกัน Safari บล็อก
          document.getElementById("displayName").innerText = "กรุณาเข้าสู่ระบบ";
          document.getElementById("statusText").innerHTML = `
            <button onclick="handleManualLogin()" style="background:#06C755; color:white; border:none; padding:8px 16px; border-radius:8px; cursor:pointer; margin-top:8px;">
              🔑 เข้าสู่ระบบด้วย LINE
            </button>
          `;
        }
      }
    } catch (err) {
      console.error("LIFF Init Error:", err);
    }
  }

  // ฟังก์ชัน Login เมื่อผู้ใช้กดปุ่มเอง
  function handleManualLogin() {
    liff.login({ redirectUri: window.location.href });
  }

  // 1. ส่งข้อความเข้าห้องแชตปัจจุบัน
  async function sendToCurrentChat() {
    if (!liff.isInClient()) {
      alert("ฟังก์ชันนี้ใช้งานได้เฉพาะการเปิดผ่านแอป LINE บนมือถือเท่านั้นครับ");
      return;
    }
    await liff.sendMessage([{ type: "text", text: "สวัสดีครับ! นี่คือข้อความทดสอบจาก LIFF 🎉" }]);
    alert("ส่งข้อความเข้าแชตแล้ว!");
    liff.closeWindow();
  }

  // 2. ปุ่มเปิดลิงก์แอดไลน์ส่วนตัว
  function openMyLink() {
    liff.openWindow({
      url: "https://line.me/ti/p/psoV4fne49", // ⚠️ อย่าลืมเปลี่ยนเป็น LINE ID / Link จริง
      external: false
    });
  }

  // 3. แชร์ Flex Message หาเพื่อน
  async function shareFlexToFriends() {
    if (!liff.isApiAvailable("shareTargetPicker")) {
      alert("ฟังก์ชันนี้รองรับการใช้งานบนแอป LINE เท่านั้นครับ");
      return;
    }

    try {
      const res = await liff.shareTargetPicker([
        {
          type: "flex",
          altText: "มีคนส่งการ์ดจาก LIFF มาให้คุณ!",
          contents: {
            type: "bubble",
            body: {
              type: "box",
              layout: "vertical",
              contents: [
                { type: "text", text: "My LIFF Application", weight: "bold", size: "lg", color: "#06C755" },
                { type: "text", text: "กดปุ่มด้านล่างเพื่อเปิดใช้งาน LIFF ของฉันได้เลย!", margin: "md", size: "sm", wrap: true }
              ]
            },
            footer: {
              type: "box",
              layout: "vertical",
              contents: [
                {
                  type: "button",
                  style: "primary",
                  color: "#06C755",
                  action: {
                    type: "uri",
                    label: "เปิดดู LIFF",
                    uri: "https://liff.line.me/2010672308-ckTBbuPW"
                  }
                }
              ]
            }
          }
        }
      ]);
      if (res) alert("แชร์ให้เพื่อนสำเร็จ!");
    } catch (err) {
      alert("แชร์ไม่สำเร็จ: " + err.message);
    }
  }

  main();
</script>
